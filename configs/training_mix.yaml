document_extraction:
  india: 0.40
  southeast_asia: 0.25
  north_america: 0.20
  europe: 0.15

image_translation:
  india: 0.35
  southeast_asia: 0.30
  north_america: 0.15
  europe: 0.20

asr:
  english_and_europe_supported: true
  indian_and_sea_non_english: experimental

training:
  implemented: false
  allowed_frameworks:
    - PyTorch
    - Transformers
    - TRL
    - PEFT
    - LLaMA-Factory
    - SWIFT
    - NeMo
  focus_regions:
    - India
    - Southeast Asia
    - North America
    - Europe

dataset_policy:
  required_metadata:
    - license
    - region
    - country
    - language
    - modality
    - task
    - pii_metadata
  reject_unknown_license: true
  reject_missing_metadata: true
  blocked_real_document_types:
    - financial
    - medical
    - legal
    - identity
  allowed_document_conditions:
    - synthetic
    - redacted
    - explicit_user_opt_in
