modal:
  app_name: local-lm-data-finetune
  volume_name: local-lm-data
  cache_volume_name: local-lm-cache
  hf_secret_name: huggingface-secret
  default_max_dataset_size_gb: 10

paths:
  remote_repo: /workspace/local-lm
  volume_root: /vol/local-lm
  raw_root: /vol/local-lm/data/raw/datasets
  processed_root: /vol/local-lm/data/processed/datasets
  reports_dir: /vol/local-lm/reports
  checkpoint: /vol/local-lm/data/registry/small_dataset_ingestion_status.json

data_ingestion:
  targets:
    - huggingface:ryanznie/SROIE_2019_with_labels
    - manual:FATURA
    - manual:XFUND
    - manual:CORD
    - synthetic:local-lm-regional-documents
    - huggingface:google/fleurs
    - uci:online-retail
  synthetic_count_per_kind: 8
  tabular_limit: 500

batch_processing:
  steps:
    - audit_registry
    - map_datasets_to_tasks
    - build_training_mix
    - build_prepared_training_manifests
    - check_regional_balance
    - verify_dataset_locality

finetuning:
  text_config: training/text/configs/llama_nemotron_nano_modal_lora.yaml
  vision_config: training/vision/configs/minicpm_v_modal_document_lora.yaml
  default_gpu: A10G
  gpu_upgrade_order:
    - A10G
    - A100-40GB
    - A100-80GB
    - H100
    - H200
  dry_run_default: true
  default_text_backend: hf_trl_peft
  optional_text_backends:
    unsloth:
      status: candidate
      use_when: faster LoRA/QLoRA is needed and dependency smoke tests pass
      notes: Keep HF TRL/PEFT as default until Unsloth path is validated with local-lm manifests.
    hybrid_mamba_nemotron:
      status: optional_blocked_by_native_wheel_build
      use_when: NVIDIA hybrid Mamba architecture is specifically required and causal-conv1d/mamba-ssm wheels are prebuilt or cached
      notes: Do not block baseline fine-tuning on source builds of causal-conv1d or mamba-ssm.
    hf_trl_peft:
      status: default
      use_when: controlled baseline training and compatibility with existing trainer tests
  retrieval_augmentation:
    vector_index_status: backlog
    use_when: selecting/evaluating examples for RAG or dataset curation, not as a replacement for SFT
    candidates:
      - sqlite_fts5
      - faiss
      - turbovec_or_equivalent_if_license_and_local_runtime_are_validated
  preflight_reports:
    text: /vol/local-lm/reports/fine_tuning_text_preflight.json
    vision: /vol/local-lm/reports/fine_tuning_vision_preflight.json
